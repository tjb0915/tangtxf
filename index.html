function clsScript(k){k=String(k||'');if(k.indexOf('多空')>=0||k==='P')return 'pivot';if(k==='R3')return 'r3';if(k==='R5')return 'r5';if(k==='S3')return 's3';if(k==='S5')return 's5';return '';}
function render(){const d=RT_WEB_DATA[current];$('nowBox').innerHTML='盤別：'+d.session+'<br>輸出：'+d.updated+'<br>瀏覽：<span id="viewCount">--</span>';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===current));$('marketTitle').textContent='期貨行情表｜'+d.quoteTitle;$('levelTitle').textContent='雙撐壓點位對照｜'+d.session;$('marketNote').textContent=d.session==='日盤'?'日盤頁顯示昨天夜盤資訊':'夜盤頁顯示當天日盤資訊';$('sourceNote').textContent='資料來源：'+d.source;renderQuote(d);renderKpi(d);renderLevels(d);renderScript(d);renderStatus(d);}
function renderQuote(d){let h='<table class=quoteTable><thead><tr>';d.quotes.forEach(x=>h+='<th>'+esc(x.k)+'</th>');h+='</tr></thead><tbody><tr>';d.quotes.forEach(x=>h+='<td>'+esc(x.v||'--')+'</td>');h+='</tr></tbody></table>';$('quoteWrap').innerHTML=h;}
function renderKpi(d){const k=d.kpi;const items=[['開盤',k.open,''],['最高',k.high,'high'],['最低',k.low,'low'],['現價',k.cur,'cur'],['盤勢',k.bias,'bias']];$('kpiWrap').innerHTML=items.map(x=>`<div class='box ${x[2]}'><div class='lab'>${x[0]}</div><div class='val'>${esc(x[1]||'--')}</div></div>`).join('');}
function renderLevels(d){
const board=$('levelBoard');board.innerHTML='<div class=axisLine></div>';
const left=d.mainLevels.filter(x=>!isNaN(Number(x.value))).map(x=>({name:x.name,value:Number(x.value),cls:clsLevel(x,'left'),side:'left'}));
const right=d.allLevels.filter(x=>!isNaN(Number(x.value))).map(x=>({name:x.name,value:Number(x.value),cls:clsLevel(x,'right'),side:'right'}));
const merged=[...left,...right].sort((a,b)=>Number(b.value)-Number(a.value));
if(merged.length===0){board.textContent='撐壓資料不足';return;}
const topPad=18,bottomPad=24,itemH=42,gap=8;
const needH=topPad+bottomPad+merged.length*itemH+Math.max(0,merged.length-1)*gap;
board.style.height=Math.max(board.clientHeight,needH)+'px';
merged.forEach(function(x,i){x.top=topPad+i*(itemH+gap);});
merged.forEach(function(x){let g=document.createElement('div');g.className='guide';g.style.top=(x.top+itemH/2)+'px';board.appendChild(g);});
merged.forEach(function(x){let el=document.createElement('div');el.className='levelItem ' + x.side + ' ' + x.cls;el.style.top=x.top+'px';el.innerHTML=`<span class='levelName'>${esc(x.name)}</span><span class='levelValue'>${fmt(x.value)}</span>`;board.appendChild(el);});
}
function buildScriptBlocks(rows){let out=[];for(let i=0;i<rows.length;i++){let k=String(rows[i].k||'').trim(),v=String(rows[i].v||'').trim();if(!k&&!v)continue;if(isLevelKey(k)){let b={type:'level',key:k,value:v,descKey:'',descVal:''};if(i+1<rows.length){let nk=String(rows[i+1].k||'').trim(),nv=String(rows[i+1].v||'').trim();if(!isLevelKey(nk)){b.descKey=nk;b.descVal=nv;i++;}}out.push(b);}else{out.push({type:'row',key:k,value:v});}}return out;}
function renderScript(d){
let rows=(d.script||[]).filter(x=>String((x.k||'')+(x.v||'')).trim()!=='');
if(rows.length===0){$('scriptBox').innerHTML='<div class=small>尚未讀到當沖操作劇本資料</div>';return;}
let blocks=buildScriptBlocks(rows);let html='';
blocks.forEach(function(b){
if(b.type==='level'){let c=clsScript(b.key);
html+=`<div class='scriptCard ${c}'><div class='scriptTop'><span class='scriptTag'>${esc(b.key)}</span><span class='scriptPoint'>${esc(b.value||'--')}</span></div>`;
if(b.descKey||b.descVal){html+=`<div class='scriptLine'><span class='scriptDescKey'>${esc(b.descKey||'說明')}</span><span class='scriptDescVal'>${esc(b.descVal||'')}</span></div>`;}
html+='</div>';
}else{let text=(b.key&&b.value)?(b.key+'：'+b.value):(b.key||b.value||'');
html+=`<div class='scriptMini'><div class='scriptMiniLine'><span class='scriptMiniVal'>${esc(text)}</span></div></div>`;}});
$('scriptBox').innerHTML=html;}
function renderStatus(d){$('statusGrid').innerHTML=(d.status||[]).map(x=>`<div class='status'><b>${esc(x.k)}</b><span>${esc(x.v)}</span></div>`).join('');}
function captureLevelArea(){
const target=document.getElementById('levelCaptureArea');
if(typeof html2canvas==='undefined'){
alert('截圖功能載入失敗，請確認網路後重試。');return;
}
html2canvas(target,{backgroundColor:'#07111f',scale:2,useCORS:true,scrollY:-window.scrollY}).then(function(srcCanvas){
const outW=1080;
const outH=1920;
const out=document.createElement('canvas');
out.width=outW;out.height=outH;
const ctx=out.getContext('2d');
ctx.fillStyle='#07111f';ctx.fillRect(0,0,outW,outH);
const padX=60;
const padY=90;
const maxW=outW-padX*2;
const maxH=outH-padY*2;
const scale=Math.min(maxW/srcCanvas.width,maxH/srcCanvas.height);
const drawW=srcCanvas.width*scale;
const drawH=srcCanvas.height*scale;
const x=(outW-drawW)/2;
const y=(outH-drawH)/2;
ctx.drawImage(srcCanvas,x,y,drawW,drawH);
let a=document.createElement('a');
let now=new Date();
let pad=n=>String(n).padStart(2,'0');
let sessionName=(current==='day'?'日盤':'夜盤');let name='期貨操作系統_WEB_雙撐壓點位對照_'+sessionName+'_手機版_'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds())+'.png';
a.href=out.toDataURL('image/png');
a.download=name;
a.click();
}).catch(function(err){
alert('截圖失敗：'+err);
});
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{current=b.dataset.tab;render();}));
window.addEventListener('resize',()=>renderLevels(RT_WEB_DATA[current]));
function loadViewCount(){
let el=document.getElementById('viewCount');
if(!el)return;
fetch('/.netlify/functions/rt-view-counter?path='+encodeURIComponent(location.pathname),{cache:'no-store'})
.then(r=>r.json()).then(j=>{el.textContent=j.views||'--';})
.catch(()=>{el.textContent='--';});
}
window.captureLevelArea=captureLevelArea;
render();
loadViewCount();

</script>
</body></html>
